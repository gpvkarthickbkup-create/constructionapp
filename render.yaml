databases:
  - name: datalytics-db
    plan: free
    databaseName: datalytics
    user: datalytics

services:
  - type: web
    name: datalytics-api
    plan: free
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npx tsx src/server.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datalytics-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://datalytics-web.vercel.app
